<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>窓寸法メモ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232638;
    --accent: #4af0a0;
    --accent2: #f0c04a;
    --text: #f0f2f8;
    --muted: #7a7e99;
    --border: rgba(255,255,255,0.08);
    --label-bg: rgba(10, 12, 20, 0.85);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .header-right {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }

  .icon-btn:active { background: #2e3250; }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #080a10;
  }

  #photo-canvas {
    max-width: 100%;
    max-height: 100%;
    display: block;
    touch-action: none;
  }

  #label-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .dim-label {
    position: absolute;
    pointer-events: all;
    transform: translate(-50%, -50%);
    cursor: move;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .dim-label-inner {
    background: var(--label-bg);
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
    backdrop-filter: blur(4px);
    position: relative;
    box-shadow: 0 0 12px rgba(74, 240, 160, 0.25);
  }

  .dim-label-inner::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }

  .dim-label .del-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 18px;
    height: 18px;
    background: #e05050;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 11px;
    line-height: 18px;
    text-align: center;
    cursor: pointer;
    display: none;
    z-index: 10;
  }

  .dim-label.selected .del-btn { display: block; }
  .dim-label.selected .dim-label-inner {
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 12px rgba(240, 192, 74, 0.3);
  }

  /* start screen */
  #start-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
    background: #080a10;
  }

  .start-icon {
    font-size: 64px;
    opacity: 0.4;
  }

  .start-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }

  .start-sub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }

  .start-btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 280px;
    margin-top: 8px;
  }

  .primary-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0a0f0a;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }

  .primary-btn:active { opacity: 0.8; }

  .secondary-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* toolbar */
  #toolbar {
    padding: 10px 16px 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: none;
  }

  #toolbar.visible { display: flex; }

  .tool-btn {
    flex: 1;
    padding: 11px 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }

  .tool-btn span:first-child { font-size: 18px; }
  .tool-btn:active { background: #2e3250; }

  .tool-btn.save-btn {
    background: rgba(74, 240, 160, 0.12);
    border-color: rgba(74, 240, 160, 0.3);
    color: var(--accent);
  }

  .tool-btn.save-btn:active { background: rgba(74, 240, 160, 0.25); }

  /* modal */
  #input-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  #input-modal.open { display: flex; }

  .modal-sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 32px;
    width: 100%;
    max-width: 480px;
    border: 1px solid var(--border);
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .dim-inputs {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .dim-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .dim-input-wrap label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .dim-input-wrap input {
    width: 100%;
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    text-align: center;
    outline: none;
  }

  .dim-input-wrap input:focus {
    border-color: var(--accent);
  }

  .dim-sep {
    font-size: 18px;
    color: var(--muted);
    margin-top: 18px;
    text-align: center;
  }

  .unit-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .unit-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
  }

  .unit-btn.active {
    border-color: var(--accent);
    background: rgba(74, 240, 160, 0.1);
    color: var(--accent);
  }

  .modal-actions {
    display: flex;
    gap: 8px;
  }

  .cancel-btn {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    cursor: pointer;
  }

  .confirm-btn {
    flex: 2;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0a0f0a;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  .hint {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,12,20,0.85);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.4s;
  }

  #file-input, #camera-input { display: none; }

  .counter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    align-self: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">WINDOW / MEASURE</div>
  <div class="header-right">
    <button class="icon-btn" id="undo-btn" title="元に戻す">↩</button>
    <button class="icon-btn" id="reset-btn" title="リセット">✕</button>
  </div>
</header>

<div id="canvas-wrap">
  <div id="start-screen">
    <div class="start-icon">🪟</div>
    <div class="start-title">窓寸法メモ</div>
    <div class="start-sub">写真を撮影・選択して<br>タップした場所に寸法を書き込めます</div>
    <div class="start-btns">
      <button class="primary-btn" id="camera-btn">📷 カメラで撮影</button>
      <button class="secondary-btn" id="gallery-btn">🖼 ギャラリーから選択</button>
    </div>
  </div>

  <canvas id="photo-canvas"></canvas>
  <div id="label-layer"></div>
  <div class="hint" id="hint">タップして寸法を追加</div>
</div>

<div id="toolbar">
  <button class="tool-btn" id="add-photo-btn">
    <span>📷</span>
    <span>写真変更</span>
  </button>
  <button class="tool-btn" id="clear-labels-btn">
    <span>🗑</span>
    <span>ラベル消去</span>
  </button>
  <button class="tool-btn save-btn" id="save-btn">
    <span>💾</span>
    <span>保存</span>
  </button>
  <div class="counter" id="label-count">0 個</div>
</div>

<div id="input-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">寸法を入力</div>
    <div class="dim-inputs">
      <div class="dim-input-wrap">
        <label>幅 (W)</label>
        <input type="number" id="width-input" placeholder="900" inputmode="numeric">
      </div>
      <div class="dim-sep">×</div>
      <div class="dim-input-wrap">
        <label>高さ (H)</label>
        <input type="number" id="height-input" placeholder="1800" inputmode="numeric">
      </div>
    </div>
    <div class="unit-row">
      <button class="unit-btn active" data-unit="mm">mm</button>
      <button class="unit-btn" data-unit="cm">cm</button>
      <button class="unit-btn" data-unit="m">m</button>
    </div>
    <div class="modal-actions">
      <button class="cancel-btn" id="cancel-btn">キャンセル</button>
      <button class="confirm-btn" id="confirm-btn">追加する</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*">
<input type="file" id="camera-input" accept="image/*" capture="environment">

<script>
  const canvas = document.getElementById('photo-canvas');
  const ctx = canvas.getContext('2d');
  const labelLayer = document.getElementById('label-layer');
  const toolbar = document.getElementById('toolbar');
  const startScreen = document.getElementById('start-screen');
  const hint = document.getElementById('hint');
  const modal = document.getElementById('input-modal');
  const labelCount = document.getElementById('label-count');

  let currentImg = null;
  let pendingX = 0, pendingY = 0;
  let selectedUnit = 'mm';
  let labels = [];
  let selectedLabel = null;
  let canvasRect = null;

  // -------- file load --------
  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        currentImg = img;
        renderCanvas();
        startScreen.style.display = 'none';
        toolbar.classList.add('visible');
        hint.style.opacity = '1';
        setTimeout(() => { hint.style.opacity = '0'; }, 3000);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('camera-btn').onclick = () => document.getElementById('camera-input').click();
  document.getElementById('gallery-btn').onclick = () => document.getElementById('file-input').click();
  document.getElementById('add-photo-btn').onclick = () => document.getElementById('file-input').click();
  document.getElementById('file-input').onchange = e => { if (e.target.files[0]) loadImage(e.target.files[0]); };
  document.getElementById('camera-input').onchange = e => { if (e.target.files[0]) loadImage(e.target.files[0]); };

  // -------- canvas render --------
  function renderCanvas() {
    if (!currentImg) return;
    const wrap = document.getElementById('canvas-wrap');
    const maxW = wrap.clientWidth;
    const maxH = wrap.clientHeight;
    const scale = Math.min(maxW / currentImg.naturalWidth, maxH / currentImg.naturalHeight, 1);
    canvas.width = Math.round(currentImg.naturalWidth * scale);
    canvas.height = Math.round(currentImg.naturalHeight * scale);
    ctx.drawImage(currentImg, 0, 0, canvas.width, canvas.height);
    canvasRect = canvas.getBoundingClientRect();
  }

  window.addEventListener('resize', () => { renderCanvas(); repositionLabels(); });

  // -------- tap to add label --------
  const canvasWrap = document.getElementById('canvas-wrap');

  canvasWrap.addEventListener('click', e => {
    if (!currentImg) return;
    if (e.target.closest('.dim-label')) return;
    deselect();
    canvasRect = canvas.getBoundingClientRect();
    const tapX = e.clientX - canvasRect.left;
    const tapY = e.clientY - canvasRect.top;
    if (tapX < 0 || tapY < 0 || tapX > canvasRect.width || tapY > canvasRect.height) return;
    pendingX = tapX / canvasRect.width;
    pendingY = tapY / canvasRect.height;
    openModal();
  });

  // -------- modal --------
  document.querySelectorAll('.unit-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedUnit = btn.dataset.unit;
    };
  });

  function openModal() {
    document.getElementById('width-input').value = '';
    document.getElementById('height-input').value = '';
    modal.classList.add('open');
    setTimeout(() => document.getElementById('width-input').focus(), 100);
  }

  document.getElementById('cancel-btn').onclick = () => modal.classList.remove('open');

  document.getElementById('confirm-btn').onclick = () => {
    const w = document.getElementById('width-input').value;
    const h = document.getElementById('height-input').value;
    if (!w && !h) { modal.classList.remove('open'); return; }
    const text = w && h ? `W${w} × H${h} ${selectedUnit}` : (w ? `W${w} ${selectedUnit}` : `H${h} ${selectedUnit}`);
    addLabel(pendingX, pendingY, text);
    modal.classList.remove('open');
  };

  // allow enter key
  [document.getElementById('width-input'), document.getElementById('height-input')].forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('confirm-btn').click(); });
  });

  // -------- label management --------
  function addLabel(xRatio, yRatio, text) {
    const id = Date.now();
    const data = { id, xRatio, yRatio, text };
    labels.push(data);
    createLabelEl(data);
    updateCount();
  }

  function createLabelEl(data) {
    canvasRect = canvas.getBoundingClientRect();
    const layerRect = labelLayer.getBoundingClientRect();

    const el = document.createElement('div');
    el.className = 'dim-label';
    el.dataset.id = data.id;

    const px = (canvasRect.left - layerRect.left) + data.xRatio * canvasRect.width;
    const py = (canvasRect.top - layerRect.top) + data.yRatio * canvasRect.height;
    el.style.left = px + 'px';
    el.style.top = py + 'px';

    el.innerHTML = `<div class="dim-label-inner">${data.text}</div><button class="del-btn">✕</button>`;

    el.querySelector('.del-btn').onclick = e => {
      e.stopPropagation();
      removeLabel(data.id);
    };

    el.addEventListener('click', e => {
      e.stopPropagation();
      selectLabel(el, data.id);
    });

    makeDraggable(el, data);
    labelLayer.appendChild(el);
  }

  function selectLabel(el, id) {
    deselect();
    el.classList.add('selected');
    selectedLabel = id;
  }

  function deselect() {
    document.querySelectorAll('.dim-label.selected').forEach(e => e.classList.remove('selected'));
    selectedLabel = null;
  }

  function removeLabel(id) {
    labels = labels.filter(l => l.id !== id);
    const el = labelLayer.querySelector(`[data-id="${id}"]`);
    if (el) el.remove();
    updateCount();
  }

  function updateCount() {
    labelCount.textContent = `${labels.length} 個`;
  }

  function repositionLabels() {
    if (!currentImg) return;
    canvasRect = canvas.getBoundingClientRect();
    const layerRect = labelLayer.getBoundingClientRect();
    document.querySelectorAll('.dim-label').forEach(el => {
      const id = +el.dataset.id;
      const data = labels.find(l => l.id === id);
      if (!data) return;
      const px = (canvasRect.left - layerRect.left) + data.xRatio * canvasRect.width;
      const py = (canvasRect.top - layerRect.top) + data.yRatio * canvasRect.height;
      el.style.left = px + 'px';
      el.style.top = py + 'px';
    });
  }

  // -------- drag --------
  function makeDraggable(el, data) {
    let startX, startY, startLeft, startTop, dragging = false;

    function onStart(cx, cy) {
      startX = cx; startY = cy;
      startLeft = parseFloat(el.style.left);
      startTop = parseFloat(el.style.top);
      dragging = false;
    }

    function onMove(cx, cy) {
      const dx = cx - startX, dy = cy - startY;
      if (!dragging && Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
      dragging = true;
      const newLeft = startLeft + dx;
      const newTop = startTop + dy;
      el.style.left = newLeft + 'px';
      el.style.top = newTop + 'px';

      canvasRect = canvas.getBoundingClientRect();
      const layerRect = labelLayer.getBoundingClientRect();
      const canvasLeft = canvasRect.left - layerRect.left;
      const canvasTop = canvasRect.top - layerRect.top;
      data.xRatio = Math.max(0, Math.min(1, (newLeft - canvasLeft) / canvasRect.width));
      data.yRatio = Math.max(0, Math.min(1, (newTop - canvasTop) / canvasRect.height));
    }

    el.addEventListener('touchstart', e => {
      e.stopPropagation();
      selectLabel(el, data.id);
      onStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      e.preventDefault();
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      selectLabel(el, data.id);
      onStart(e.clientX, e.clientY);
      const onMM = ev => onMove(ev.clientX, ev.clientY);
      const onMU = () => { window.removeEventListener('mousemove', onMM); window.removeEventListener('mouseup', onMU); };
      window.addEventListener('mousemove', onMM);
      window.addEventListener('mouseup', onMU);
    });
  }

  // -------- undo / clear --------
  document.getElementById('undo-btn').onclick = () => {
    if (labels.length === 0) return;
    const last = labels[labels.length - 1];
    removeLabel(last.id);
  };

  document.getElementById('clear-labels-btn').onclick = () => {
    if (!confirm('全てのラベルを消去しますか？')) return;
    labels = [];
    labelLayer.innerHTML = '';
    updateCount();
  };

  document.getElementById('reset-btn').onclick = () => {
    if (!confirm('写真とラベルをリセットしますか？')) return;
    currentImg = null;
    labels = [];
    labelLayer.innerHTML = '';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    startScreen.style.display = 'flex';
    toolbar.classList.remove('visible');
    updateCount();
  };

  // -------- save --------
  document.getElementById('save-btn').onclick = () => {
    if (!currentImg) return;

    // offscreen canvas = photo + labels drawn
    const off = document.createElement('canvas');
    off.width = canvas.width;
    off.height = canvas.height;
    const octx = off.getContext('2d');
    octx.drawImage(canvas, 0, 0);

    canvasRect = canvas.getBoundingClientRect();
    const layerRect = labelLayer.getBoundingClientRect();
    const scaleX = canvas.width / canvasRect.width;
    const scaleY = canvas.height / canvasRect.height;

    labels.forEach(data => {
      const px = data.xRatio * canvas.width;
      const py = data.yRatio * canvas.height;

      // dot
      octx.beginPath();
      octx.arc(px, py + 5 * scaleY, 5 * scaleX, 0, Math.PI * 2);
      octx.fillStyle = '#4af0a0';
      octx.fill();

      // box
      const fs = 20 * scaleX;
      octx.font = `500 ${fs}px 'DM Mono', monospace`;
      const tw = octx.measureText(data.text).width;
      const bw = tw + 24 * scaleX;
      const bh = fs + 16 * scaleY;
      const bx = px - bw / 2;
      const by = py - bh - 6 * scaleY;

      octx.fillStyle = 'rgba(10,12,20,0.85)';
      roundRect(octx, bx, by, bw, bh, 6 * scaleX);
      octx.fill();

      octx.strokeStyle = '#4af0a0';
      octx.lineWidth = 1.5 * scaleX;
      roundRect(octx, bx, by, bw, bh, 6 * scaleX);
      octx.stroke();

      octx.fillStyle = '#4af0a0';
      octx.fillText(data.text, bx + 12 * scaleX, by + bh - 8 * scaleY);
    });

    off.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `window-measure-${Date.now()}.jpg`;
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/jpeg', 0.95);
  };

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // prevent pinch zoom on safari
  document.addEventListener('gesturestart', e => e.preventDefault());
</script>
</body>
</html>
